
name: Review workflow

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - review_requested
      - synchronize

jobs:
  detect-task:
    name: Detect Task In Current PR Comments
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.find.outputs.task_id }}
      found: ${{ steps.find.outputs.found }}

    steps:
      - name: Find task id in current PR comments
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number; // current PR only

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100
              }
            );

            const regex = /✅\s*Review task created successfully:\s*(TASK\d+)/i;

            let taskId = "";
            for (const comment of comments.reverse()) {
              const body = comment.body || "";
              const match = body.match(regex);
              if (match) {
                taskId = match[1];
                break;
              }
            }

            core.setOutput("task_id", taskId);
            core.setOutput("found", taskId ? "true" : "false");

  validation-check:
    name: ReviewTool API Validation
    needs: detect-task
    if: needs.detect-task.outputs.found == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python script/task_validation.py \
            '${{ toJson(github.event.pull_request) }}' \
            '${{ github.repository }}' \
            '${{ github.event.pull_request.number }}' \
            '${{ needs.detect-task.outputs.task_id }}'

  create-review-task:
    name: Create Review Task
    needs: detect-task
    if: needs.detect-task.outputs.found != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python script/create_review_task.py \
            '${{ toJson(github.event.pull_request) }}' \
            '${{ github.repository }}' \
            '${{ github.event.pull_request.number }}'
            
  final-reviewtool-gate:
    name: ReviewTool Final Gate
    needs: [detect-task, validation-check, create-review-task]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Decide final result
        run: |
          echo "detect found = ${{ needs.detect-task.outputs.found }}"
          echo "validation result = ${{ needs.validation-check.result }}"
          echo "create result = ${{ needs.create-review-task.result }}"
  
          if [ "${{ needs.detect-task.outputs.found }}" = "true" ]; then
            if [ "${{ needs.validation-check.result }}" != "success" ]; then
              echo "Validation was expected but did not succeed"
              exit 1
            fi
          else
            echo "Task was just created in this run"
            exit 1
          fi
